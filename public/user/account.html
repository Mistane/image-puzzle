<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent: #00cf71;
            --text: #ffffff;
            --input-bg: #1f1f1f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: var(--text);
            font-family: 'Verdana', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            width: 400px;
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            border: 2px solid #444;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            border-bottom: 2px solid #444;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            color: #888;
            transition: 0.3s;
            background: none;
            border: none;
            font-size: 1.1rem;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
	    margin-top: 5px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #aaa;
        }

        input {
            background-color: var(--input-bg);
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        /* Logic to hide/show forms */
        #register-form {
            display: none;
        }

        /* Utility for switching */
        .hidden {
            display: none !important;
        }
        
        .visible {
            display: flex !important;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="tabs">
            <button id="login-tab" class="tab active" onclick="switchTab('login')">LOGIN</button>
            <button id="register-tab" class="tab" onclick="switchTab('register')">REGISTER</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" action="/login" method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username"  placeholder="Enter username...">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password"  placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn">SIGN IN</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" action="/register" method="POST">
            <div class="input-group">
                <label>New Username</label>
                <input type="text" name="username"  placeholder="Pick a nickname">
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" name="password"  placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
        </form>
    </div>

    <script>
        function switchTab(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');

            if (type === 'login') {
                loginForm.classList.add('visible');
                registerForm.classList.remove('visible');
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                registerForm.classList.add('visible');
                loginForm.classList.remove('visible');
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        }
        
        // Ensure default state on load
        window.onload = () => switchTab('login');
    </script>
</body>
</html>
